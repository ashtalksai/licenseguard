<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!-- Background transparent -->
  
  <!-- Shield icon -->
  <g transform="translate(8, 4)">
    <!-- Shield shape -->
    <path d="M32 4 L56 14 L56 36 Q56 54 32 66 Q8 54 8 36 L8 14 Z" fill="#1E2D4A" stroke="#F59E0B" stroke-width="2"/>
    
    <!-- Status dots inside shield -->
    <!-- Green dot (compliant) -->
    <circle cx="22" cy="32" r="5" fill="#10B981"/>
    <!-- Amber dot (expiring soon) -->
    <circle cx="32" cy="40" r="5" fill="#F59E0B"/>
    <!-- Red dot (expired) - pulsing -->
    <circle cx="42" cy="32" r="5" fill="#EF4444"/>
    
    <!-- Small connecting lines suggesting credential cards -->
    <line x1="22" y1="32" x2="27" y2="36" stroke="#FAFAF8" stroke-width="1" opacity="0.4"/>
    <line x1="42" y1="32" x2="37" y2="36" stroke="#FAFAF8" stroke-width="1" opacity="0.4"/>
    
    <!-- Shield highlight -->
    <path d="M32 8 L50 16 L50 36" stroke="#F59E0B" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.3"/>
  </g>
  
  <!-- Wordmark -->
  <text x="76" y="38" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="22" font-weight="700" fill="#1E2D4A" letter-spacing="-0.5">Cred</text>
  <text x="118" y="38" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="22" font-weight="700" fill="#F59E0B" letter-spacing="-0.5">Guard</text>
  
  <!-- Tagline -->
  <text x="77" y="56" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="10" font-weight="400" fill="#1E2D4A" opacity="0.6" letter-spacing="0.5">LICENSE COMPLIANCE · SIMPLIFIED</text>
</svg>
